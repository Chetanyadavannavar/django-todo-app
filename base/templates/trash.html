{% extends 'main.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'task.css' %}">
{% endblock %}

{% block content %}

<div class="page-container">

    <h2 class="page-title">
        Trash
    </h2>

    {% for task in tasks %}

        <div class="task-card trash">

            <h3>{{task.title}}</h3>

            <p>{{task.desc}}</p>

            <div class="task-actions">

                <a href="{% url 'drestore' task.id %}" class="btn btn-warning">
                    Restore
                </a>

                <a href="{% url 'ddelete' task.id %}" class="btn btn-danger">
                    Delete
                </a>

            </div>

        </div>

    {% empty %}

        <p class="empty-msg">
            Trash is Empty
        </p>

    {% endfor %}

</div>

{% endblock %}
