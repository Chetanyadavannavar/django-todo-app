{% extends 'main.html' %}

{% block content %}

<center>

    <h2>Forget Password</h2>
    <br>

    {% if messages %}
        {% for message in messages %}
            <h3 style="color:red;">{{ message }}</h3>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Enter Username:</label>
        <input type="text" name="username" required>
        <br><br>

        <button type="submit">Submit</button>

    </form>

</center>

{% endblock %}
