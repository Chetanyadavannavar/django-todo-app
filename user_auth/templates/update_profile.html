{% extends 'main.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'register.css' %}">
{% endblock %}

{% block content %}

<div class="register-container">

    {% if messages %}
        {% for message in messages %}
            <p style="color:green; text-align:center;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <h2>Update Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Profile Picture:</label>
        <input type="file" name="pic"><br><br>

        <label>First Name:</label>
        <input type="text" name="fname" value="{{ data.first_name }}" required><br><br>

        <label>Last Name:</label>
        <input type="text" name="lname" value="{{ data.last_name }}" required><br><br>

        <label>Email:</label>
        <input type="email" name="email" value="{{ data.email }}" required><br><br>

        <label>Username:</label>
        <input type="text" value="{{ data.username }}" readonly><br><br>

        <button type="submit">Update Profile</button>
    </form>

</div>

{% endblock %}
